<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTube Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF3D00;
            --secondary: #6200EA;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #999;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #050505 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-card {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(255, 61, 0, 0.1);
        }

        .options-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        select, .check-group {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 0.85rem;
            outline: none;
        }

        .check-group {
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .check-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        button#download-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), #FF7043);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 61, 0, 0.3);
        }

        button#download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(255, 61, 0, 0.4);
        }

        button#download-btn:disabled {
            background: #333;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        #preview-card {
            display: none;
            margin-top: 32px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid var(--glass-border);
            text-align: left;
        }

        #thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        #video-title {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 10px;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        #player-container {
            display: none;
            margin-top: 32px;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        video { width: 100%; display: block; background: #000; }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="status-badge">Ready to Download</div>
        <h1>ProTube</h1>
        <p class="subtitle">Minimal & Powerful Downloader</p>

        <div class="input-wrapper">
            <input type="text" id="url" placeholder="Paste YouTube URL here..." autocomplete="off">
        </div>

        <div class="options-row">
            <select id="quality">
                <option value="1080">1080p</option>
                <option value="720" selected>720p</option>
                <option value="480">480p</option>
            </select>
            <div class="check-group">
                <label><input type="checkbox" id="video" checked> MP4</label>
                <label><input type="checkbox" id="audio"> MP3</label>
                <label title="Playlist"><input type="checkbox" id="playlist"> PL</label>
            </div>
        </div>

        <div style="margin-bottom: 20px; text-align: left;">
            <a href="#" onclick="document.getElementById('cookie-section').style.display='block';this.style.display='none';return false;" 
               style="color: var(--text-dim); font-size: 0.7rem; text-decoration: none;">+ Add Cookies (to bypass bot detection)</a>
            <div id="cookie-section" style="display: none;">
                <label style="font-size: 0.7rem; color: var(--text-dim); display: block; margin-bottom: 5px;">PASTE COOKIES (Netscape format)</label>
                <textarea id="cookies" placeholder="# Netscape HTTP Cookie File..." 
                          style="width: 100%; height: 80px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; color: #888; font-size: 0.7rem; padding: 10px; outline: none;"></textarea>
            </div>
        </div>

        <button id="download-btn" onclick="fetchInfo()">Start Download</button>

        <div id="preview-card">
            <img id="thumbnail" src="" alt="Thumbnail">
            <div id="video-title">Loading...</div>
            <div class="progress-container">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.75rem; color: var(--text-dim);">
                <span id="status-text">Downloading...</span>
                <span id="percent-text">0%</span>
            </div>
        </div>

        <div id="player-container">
            <video id="player" controls autoplay>
                <source id="video-source" src="" type="video/mp4">
            </video>
        </div>

        <div id="message" style="margin-top: 20px; font-size: 0.8rem;"></div>
    </div>

    <script>
        let eventSource = null;

        async function fetchInfo() {
            const url = document.getElementById('url').value.trim();
            if (!url) return;

            const btn = document.getElementById('download-btn');
            const preview = document.getElementById('preview-card');
            const thumb = document.getElementById('thumbnail');
            const titleEl = document.getElementById('video-title');
            const playerContainer = document.getElementById('player-container');
            const msg = document.getElementById('message');

            btn.disabled = true;
            btn.innerText = "Processing...";
            msg.innerText = "";
            playerContainer.style.display = 'none';

            try {
                // Save cookies first
                const cookies = document.getElementById('cookies').value;
                await fetch('/prepare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cookies: cookies })
                });

                const response = await fetch(`/info?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data.error) throw new Error(data.error);

                preview.style.display = 'block';
                thumb.src = data.thumbnail;
                titleEl.innerText = data.title;
                
                // Immediate playback!
                if (data.streamUrl) {
                    const playerContainer = document.getElementById('player-container');
                    const player = document.getElementById('player');
                    const videoSource = document.getElementById('video-source');
                    
                    videoSource.src = data.streamUrl;
                    player.load();
                    playerContainer.style.display = 'block';
                    player.play().catch(e => console.log("Auto-play blocked, user must click play"));
                }

                startDownload(url);
            } catch (e) {
                msg.innerHTML = `<span style="color:#ff4d4d">Error: ${e.message}</span>`;
                btn.disabled = false;
                btn.innerText = "Start Download";
            }
        }

        function startDownload(url) {
            const quality = document.getElementById('quality').value;
            const videoChecked = document.getElementById('video').checked;
            const audioChecked = document.getElementById('audio').checked;
            const playlistChecked = document.getElementById('playlist').checked;

            let type = 'video';
            if (videoChecked && audioChecked) type = 'both';
            else if (audioChecked) type = 'audio';

            const progressFill = document.getElementById('progress-fill');
            const percentText = document.getElementById('percent-text');
            const statusText = document.getElementById('status-text');
            const btn = document.getElementById('download-btn');

            if (eventSource) eventSource.close();

            const sseUrl = `/progress?url=${encodeURIComponent(url)}&quality=${quality}&type=${type}&playlist=${playlistChecked}`;
            eventSource = new EventSource(sseUrl);

            eventSource.addEventListener('progress', function(event) {
                const data = JSON.parse(event.data);
                progressFill.style.width = data.percent + '%';
                percentText.innerText = data.percent + '%';
                statusText.innerText = 'Downloading...';
            });

            eventSource.addEventListener('complete', function(event) {
                const fileName = event.data;
                statusText.innerText = 'Completed!';
                statusText.style.color = '#4dff88';
                
                // Show player
                const playerContainer = document.getElementById('player-container');
                const player = document.getElementById('player');
                const videoSource = document.getElementById('video-source');
                
                videoSource.src = '/downloads/' + encodeURIComponent(fileName);
                player.load();
                playerContainer.style.display = 'block';
                player.play().catch(e => console.log("Auto-play blocked"));

                btn.disabled = false;
                btn.innerText = "Start Download";
                eventSource.close();
            });

            eventSource.addEventListener('error', function(event) {
                statusText.innerText = 'Error occurred';
                statusText.style.color = '#ff4d4d';
                btn.disabled = false;
                btn.innerText = "Start Download";
                eventSource.close();
            });
        }
    </script>
</body>
</html>
